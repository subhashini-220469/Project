<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - e-shop</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fa;
            margin: 0;
            padding: 0;
        }

        .nav {
            background: red;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav a {
            color: white;
            text-decoration: none;
            margin-right: 30px;
            font-weight: 600;
            font-size: 16px;
        }
        
        .container {
            width: 80%;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }

        .cart-items {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .cart-items h2 {
            margin-top: 0;
            color: #222;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .item {
            display: flex;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }

        .item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 20px;
            background: #f9f9f9;
        }

        .item-details {
            flex-grow: 1;
        }

        .item-details h4 {
            margin: 0 0 8px 0;
            font-size: 18px;
            color: #333;
        }

        .item-details p {
            margin: 0;
            color: #777;
            font-size: 14px;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .quantity-control input {
            width: 40px;
            text-align: center;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .item-price {
            font-size: 20px;
            font-weight: bold;
            color: red;
            margin-left: 30px;
        }

        /* Order Summary */
        .summary {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            height: fit-content;
        }

        .summary h3 {
            margin-top: 0;
            color: #222;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            color: #555;
            font-size: 16px;
        }

        .summary-row.total {
            font-size: 22px;
            font-weight: bold;
            color: black;
            border-top: 2px solid #f0f0f0;
            padding-top: 15px;
            margin-top: 15px;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: green;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 20px;
        }

        .checkout-btn:hover {
            background: #008000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,128,0,0.3);
        }

    </style>
</head>
<body>

    <div class="nav">
        <div>
            <a href="index.html" style="font-size: 22px;">🛒 e-shop</a>
        </div>
        <div>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="bestseller.html">Trending</a>
        </div>
    </div>

    <div class="container">
        <!-- Cart Items List -->
        <div class="cart-items">
            <h2>Your Shopping Cart</h2>
            
            <div class="item">
                <img src="headphones.jpeg" alt="Headphones">
                <div class="item-details">
                    <h4>Premium Wireless Headphones</h4>
                    <p>Color: Matte Black</p>
                </div>
                <div class="quantity-control">
                    <label>Qty:</label>
                    <input type="number" value="1" min="1">
                </div>
                <div class="item-price">$199</div>
            </div>

            <div class="item">
                <img src="buds.jpeg" alt="Buds">
                <div class="item-details">
                    <h4>True Wireless Earbuds</h4>
                    <p>Color: Cloud White</p>
                </div>
                <div class="quantity-control">
                    <label>Qty:</label>
                    <input type="number" value="2" min="1">
                </div>
                <div class="item-price">$178</div>
            </div>
            
        </div>

        <!-- Order Summary -->
        <div class="summary">
            <h3>Order Summary</h3>
            
            <div class="summary-row">
                <span>Subtotal (3 items)</span>
                <span>$377.00</span>
            </div>
            
            <div class="summary-row">
                <span>Shipping Estimate</span>
                <span style="color: green;">Free</span>
            </div>
            
            <div class="summary-row">
                <span>Estimated Tax (8%)</span>
                <span>$30.16</span>
            </div>
            
            <div class="summary-row total">
                <span>Total</span>
                <span style="color: red;">$407.16</span>
            </div>

            <button class="checkout-btn">Proceed to Checkout</button>
        </div>
    </div>

    <!-- Ensure base interactivity script is linked -->
    <script src="script.js"></script>
    <script>
        // Specific checkout cart page interactivity extension
        document.querySelector('.checkout-btn').addEventListener('click', function() {
            this.innerHTML = "Processing Payment...";
            this.style.backgroundColor = "gray";
            
            setTimeout(() => {
                alert("Payment Successful! Thank you for your order.");
                this.innerHTML = "Order Placed!";
                this.style.backgroundColor = "green";
                
                // Animate clearing the cart and showing success state
                document.querySelector('.cart-items').innerHTML = '<h2>Your Shopping Cart</h2><p style="padding: 20px; font-size: 18px; color: green; text-align: center;"><b>✅ Your order was successfully placed and is being processed!</b></p>';
                document.querySelector('.summary-row.total').innerHTML = '<span>Total</span><span style="color: red;">$0.00</span>';
            }, 1500); // 1.5 second loading imitation
        });
    </script>
</body>
</html>
